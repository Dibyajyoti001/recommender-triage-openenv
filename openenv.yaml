name: recommendation-policy-triage
version: "1.0.0"
description: >
  A structured OpenEnv benchmark for session-level recommendation policy under
  memory uncertainty, repetition fatigue, novelty trade-offs, and live intent drift.

author: "Dibyajyoti001"
tags:
  - openenv
  - benchmark
  - recommendation
  - recommender-systems
  - reinforcement-learning
  - session-policy
  - memory

tasks:
  - id: task_1
    name: Stable Preference Exploitation
    difficulty: easy
    max_steps: 20
    description: >
      Historical memory is reliable and live session intent mostly agrees with it.
      The agent should exploit stable preference efficiently without unnecessary exploration.

  - id: task_2
    name: Repetition Fatigue Control
    difficulty: medium
    max_steps: 20
    description: >
      The user strongly prefers a narrow topic region, but repeated similar recommendations
      create fatigue and reduce long-term satisfaction. The agent must balance relevance and diversity.

  - id: task_3
    name: Memory vs Live Signal Conflict
    difficulty: hard
    max_steps: 20
    description: >
      Historical memory and live session behavior diverge. The agent must detect intent drift,
      reduce reliance on stale memory, and recover relevance quickly.

action_space:
  type: structured
  schema: Action

observation_space:
  type: structured
  schema: Observation

endpoints:
  reset:
    method: POST
    path: /reset
    response_model: Observation
  step:
    method: POST
    path: /step
    request_model: Action
    response_model: StepResult
  state:
    method: GET
    path: /state
    response_model: EnvironmentState