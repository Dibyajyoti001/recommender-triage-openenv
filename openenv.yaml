spec_version: 1
name: recommendation-policy-triage
type: space
runtime: fastapi
app: server.app:app
port: 7860
version: "1.0.0"
description: >
  A structured OpenEnv benchmark for user experience, trust, and long-horizon
  recommendation control under memory uncertainty, repetition fatigue, noisy
  feedback, novelty trade-offs, resource constraints, and live intent drift.

author: "Dibyajyoti001"
tags:
  - openenv
  - benchmark
  - recommendation
  - recommender-systems
  - reinforcement-learning
  - session-policy
  - memory

tasks:
  - id: task_1
    name: Stable Preference Exploitation
    difficulty: easy
    max_steps: 20
    description: >
      Historical memory is reliable and live session intent mostly agrees with it.
      The agent should exploit stable preference efficiently without unnecessary exploration.

  - id: task_2
    name: Repetition Fatigue Control
    difficulty: medium
    max_steps: 20
    description: >
      The user strongly prefers a narrow topic region, but repeated similar recommendations
      create fatigue and reduce long-term satisfaction. The agent must balance relevance and diversity.

  - id: task_3
    name: Memory vs Live Signal Conflict
    difficulty: hard
    max_steps: 20
    description: >
      Historical memory and live session behavior diverge. The agent must detect intent drift,
      reduce reliance on stale memory, and recover relevance quickly.

  - id: task_4
    name: Echo Chamber Collapse
    difficulty: hard
    max_steps: 20
    description: >
      Strong early relevance hides a delayed collapse in trust and novelty tolerance.
      The agent must diversify before slow-history pressure locks the session into an echo chamber
      while staying within visible resource and safety constraints.

  - id: task_5
    name: Noisy Signal Calibration
    difficulty: hard
    max_steps: 20
    description: >
      Feedback is noisy and good-looking candidates can still disappoint. The agent must manage
      confidence, trust, risk, and resource pressure under uncertainty.

action_space:
  type: structured
  schema: Action

observation_space:
  type: structured
  schema: Observation

endpoints:
  reset:
    method: POST
    path: /reset
    response_model: Observation
  step:
    method: POST
    path: /step
    request_model: Action
    response_model: StepResult
  state:
    method: GET
    path: /state
    response_model: EnvironmentState
